<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jellypop Photobooth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Colors & Typography */
        :root {
            --primary-red: #b31217;
            --dark-text: #1a1a1a;
            --light-text: #ffffff;
        }

        body {
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: var(--dark-text);
            overflow-x: hidden;
        }

        .impact-title {
            font-family: 'Impact LT Std Bold', Impact, sans-serif;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .roboto-bold {
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
        }

        /* Header */
        header {
            background-color: var(--primary-red);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative; /* Added to keep header above slider */
            z-index: 10;
        }

        .header-logo-img {
            height: 40px;
            width: auto;
            display: block;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 40px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: var(--light-text);
            text-decoration: none;
            font-size: 1.1rem;
        }

        /* Hero Section (Carousel) */
        .hero {
            position: relative;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            text-align: center;
            color: var(--light-text);
            overflow: hidden;
        }

        /* The Slider Container */
        .hero-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Individual Slides */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; /* Smooth fade effect */
        }

        .slide.active {
            opacity: 1;
        }

        /* Dark overlay so the white text stays readable over photos */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 2;
        }

        /* Keeps text on top of the background */
        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 5rem;
            line-height: 0.9;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero p {
            margin: 0 auto 30px auto;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .hero-btn {
            background: transparent;
            border: 2px solid var(--light-text);
            color: var(--light-text);
            padding: 12px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s ease;
        }

        .hero-btn:hover {
            background: var(--light-text);
            color: var(--dark-text);
        }

        /* Services Section */
        .services-section {
            position: relative;
            padding: 80px 0;
            display: flex;
            justify-content: center;
            background-color: #ffffff;
        }

        .services-box {
            background-color: var(--primary-red);
            color: var(--light-text);
            width: 70%;
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .services-box h2 {
            font-size: 4rem;
            margin-bottom: 40px;
        }

        .services-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            text-align: left;
        }

        .service-row h3 {
            text-align: center;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .service-columns {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        .service-item {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .booth-img {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 80%;
            z-index: 3;
        }

        .booth-left { left: 5%; }
        .booth-right { right: 5%; }

        /* Testimonials Section */
        .testimonials {
            background: linear-gradient(to bottom, #ffffff 40%, var(--primary-red) 40%);
            padding: 60px 50px;
            text-align: center;
